spring.application.name=source_app

jokes.api.url=http://localhost:8081/jokes

management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true

# -------------------------
# RETRY CONFIG
# -------------------------
resilience4j.retry.retry-aspect-order=2
resilience4j.retry.instances.jokesService.max-attempts=3
resilience4j.retry.instances.jokesService.wait-duration=1s
resilience4j.retry.instances.jokesService.enable-exponential-backoff=true
resilience4j.retry.instances.jokesService.exponential-backoff-multiplier=2
resilience4j.retry.instances.jokesService.retry-exceptions=org.springframework.web.client.RestClientException,java.io.IOException

# -------------------------
# CIRCUIT BREAKER CONFIG
# -------------------------
resilience4j.circuitbreaker.circuit-breaker-aspect-order=1
resilience4j.circuitbreaker.instances.jokesService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.jokesService.sliding-window-size=10
resilience4j.circuitbreaker.instances.jokesService.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.jokesService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.jokesService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.jokesService.permitted-number-of-calls-in-half-open-state=2
